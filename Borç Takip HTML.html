<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>WM HOME — Tahsilat Paneli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F3EF; --card:#FFFFFF; --ink:#20221F; --muted:#6C6F68; --line:#E3E1DA;
    --brand:#23262B; --brand-ink:#F5F4F0;
    --red:#B23327; --red-bg:#FAEBE8; --red-ink:#7C1F16;
    --amber:#B97A0E; --amber-bg:#FBF2DE; --amber-ink:#6E4708;
    --blue:#1F6FB2; --blue-bg:#E9F1F9; --blue-ink:#134C7E;
    --green:#1E8A4C; --green-bg:#E7F4EC; --green-ink:#135C32;
    --orange:#C86A14; --orange-bg:#FBEEDF; --orange-ink:#7E430B;
    --grey-bg:#EDECE8; --radius:10px;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  body{font-family:'Inter',-apple-system,'Segoe UI',sans-serif; background:var(--bg); color:var(--ink); font-size:15px; line-height:1.45}
  button{font:inherit; cursor:pointer; border:none; background:none}
  input,select,textarea{font:inherit; color:var(--ink)}
  a{color:inherit}

  /* ÜST BAR */
  .topbar{background:var(--brand); color:var(--brand-ink); padding:10px 16px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; position:sticky; top:0; z-index:20}
  .logo{font-weight:800; letter-spacing:.06em; font-size:17px; cursor:pointer; white-space:nowrap}
  .searchwrap{flex:1; min-width:180px; position:relative}
  .searchwrap input{width:100%; padding:9px 12px; border-radius:8px; border:1px solid #3A3E44; background:#2C3036; color:#fff; outline:none}
  .searchwrap input::placeholder{color:#9BA0A8}
  .btn{padding:9px 14px; border-radius:8px; font-weight:600; display:inline-flex; align-items:center; gap:6px}
  .btn-add{background:#E8B04B; color:#33230A}
  .btn-ghost{background:transparent; color:var(--brand-ink); border:1px solid #4A4E55}
  .btn-primary{background:var(--brand); color:var(--brand-ink)}
  .btn-line{border:1px solid var(--line); background:#fff; color:var(--ink)}
  .btn-danger{background:var(--red-bg); color:var(--red-ink)}
  .btn-green{background:var(--green); color:#fff}
  .btn-wa{background:#1E8A4C; color:#fff}
  .btn-icra{background:var(--red); color:#fff}
  .btn:disabled{opacity:.5; cursor:default}

  .wrap{max-width:1080px; margin:0 auto; padding:18px 16px 60px}
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:16px}
  .muted{color:var(--muted); font-size:13px}
  h2{font-size:18px; font-weight:800; margin-bottom:10px}

  /* ANA SAYFA */
  .bigdate{font-size:26px; font-weight:800; margin:4px 0 2px}
  .statline{color:var(--muted); font-size:14px; margin-bottom:16px}
  .board{display:grid; grid-template-columns:230px 1fr 250px; gap:14px; align-items:start}
  @media (max-width:820px){ .board{grid-template-columns:1fr} }
  .sidebox{border-radius:var(--radius); padding:14px; cursor:pointer; border:1px solid transparent}
  .sidebox:hover{filter:brightness(.97)}
  .sidebox .num{font-size:26px; font-weight:800; margin:2px 0}
  .sidebox .go{font-size:12px; font-weight:600; margin-top:8px}
  .box-red{background:var(--red-bg); color:var(--red-ink)}
  .box-blue{background:var(--blue-bg); color:var(--blue-ink)}
  .upitem{font-size:13px; margin-bottom:5px; display:flex; justify-content:space-between; gap:8px}
  .uptotal{border-top:1px solid rgba(0,0,0,.12); margin-top:8px; padding-top:8px; font-weight:700; font-size:13px}

  /* KİŞİ KARTLARI */
  .person{background:#fff; border:1px solid var(--line); border-left:5px solid var(--line); border-radius:8px; padding:11px 13px; margin-bottom:8px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; gap:10px}
  .person:hover{border-color:#C8C5BC; border-left-width:5px}
  .person .name{font-weight:600}
  .person .sub{font-size:13px; color:var(--muted)}
  .person .amt{font-weight:700; white-space:nowrap; text-align:right}
  .p-red{border-left-color:var(--red); background:#FDF6F5}
  .p-amber{border-left-color:#E0A23C; background:#FDF9F0}
  .p-blue{border-left-color:var(--blue)}
  .p-green{border-left-color:var(--green)}
  .p-orange{border-left-color:var(--orange)}
  .p-grey{border-left-color:#B9B7B0; opacity:.75}
  .tag{display:inline-block; font-size:11.5px; font-weight:700; padding:2px 8px; border-radius:99px; white-space:nowrap}
  .t-red{background:var(--red-bg); color:var(--red-ink)} .t-amber{background:var(--amber-bg); color:var(--amber-ink)}
  .t-blue{background:var(--blue-bg); color:var(--blue-ink)} .t-green{background:var(--green-bg); color:var(--green-ink)}
  .t-orange{background:var(--orange-bg); color:var(--orange-ink)} .t-grey{background:var(--grey-bg); color:#5A5C56}

  /* FORMLAR */
  .field{margin-bottom:12px}
  .field label{display:block; font-size:13px; font-weight:600; margin-bottom:5px; color:#44463F}
  .field input,.field select,.field textarea{width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px; background:#fff}
  .field textarea{min-height:90px; resize:vertical}
  .cols2{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  @media (max-width:600px){ .cols2{grid-template-columns:1fr} }

  /* DETAY */
  .dethead{display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:flex-start}
  .detname{font-size:22px; font-weight:800}
  .kv{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin:14px 0}
  .kv .cell{background:var(--bg); border-radius:8px; padding:10px 12px}
  .kv .cell b{display:block; font-size:17px; margin-top:2px}
  .kv .cell span{font-size:12px; color:var(--muted); font-weight:600}
  .note{border:1px solid var(--line); border-radius:8px; padding:10px 12px; margin-bottom:8px; background:#FFFDF8}
  .note .meta{font-size:12px; color:var(--muted); margin-bottom:4px; display:flex; justify-content:space-between; gap:8px}
  .note .body{white-space:pre-wrap}
  .payrow{display:flex; justify-content:space-between; align-items:center; padding:8px 4px; border-bottom:1px dashed var(--line); font-size:14px}
  .iconbtn{color:var(--muted); font-size:13px; padding:2px 6px; border-radius:6px}
  .iconbtn:hover{background:var(--grey-bg)}
  .section{margin-top:20px}
  .flexrow{display:flex; gap:8px; flex-wrap:wrap; align-items:center}

  /* GİRİŞ */
  .loginwrap{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px}
  .loginbox{background:#fff; border:1px solid var(--line); border-radius:14px; padding:30px; width:100%; max-width:380px}
  .loginbox h1{font-size:20px; font-weight:800; letter-spacing:.04em; text-align:center; margin-bottom:4px}
  .loginbox p{text-align:center; color:var(--muted); font-size:13px; margin-bottom:20px}
  .err{background:var(--red-bg); color:var(--red-ink); border-radius:8px; padding:10px 12px; font-size:13px; margin-bottom:12px}
  .ok{background:var(--green-bg); color:var(--green-ink); border-radius:8px; padding:10px 12px; font-size:13px; margin-bottom:12px}
  .back{color:var(--muted); font-size:13px; font-weight:600; cursor:pointer; margin-bottom:12px; display:inline-block}
  .back:hover{color:var(--ink)}
  .empty{text-align:center; color:var(--muted); padding:30px 10px}
  .toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--brand); color:#fff; padding:10px 18px; border-radius:99px; font-size:14px; z-index:99; box-shadow:0 4px 14px rgba(0,0,0,.25)}
  @media (max-width:600px){ .topbar{gap:8px} .logo{font-size:15px} .btn-add span{display:none} }
</style>
</head>
<body>
<div id="app"><div class="loginwrap"><div class="muted">Yükleniyor…</div></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
/* ================= AYAR ================= */
const SUPABASE_URL = 'https://gwnqlemzfdwlxqfbcljq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_gB0RWMZYk_IxDX1VaAUZdA_lKrHsLc2';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ================= DURUM ================= */
let S = { view:'dash', session:null, takipler:[], ayarlar:null, detail:null, kayitlar:[], odemeler:[], listMode:null, query:'' };

/* ================= YARDIMCILAR ================= */
const $ = id => document.getElementById(id);
const esc = s => String(s??'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const para = n => new Intl.NumberFormat('tr-TR',{minimumFractionDigits:0, maximumFractionDigits:2}).format(Number(n)||0) + ' TL';
const bugunISO = () => { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
const trTarih = iso => { if(!iso) return '—'; const [y,m,g]=iso.split('T')[0].split('-'); return `${g}.${m}.${y}`; };
const trSaat = iso => new Date(iso).toLocaleString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
const telNorm = t => { let d=String(t||'').replace(/\D/g,''); if(d.startsWith('0')) d='9'+d; if(d.length===10&&d.startsWith('5')) d='90'+d; if(!d.startsWith('90')&&d.length===11) d='9'+d; return d; };
function toast(msg){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2400); }

/* Her takip için hesaplanan alanlar */
function zengin(t){
  const odenen = (t.odemeler||[]).reduce((a,o)=>a+Number(o.tutar),0);
  const kalan = Math.max(0, Number(t.toplam_borc) - odenen);
  const bugun = bugunISO();
  let st, css, tagcss, etiket;
  if(t.durum==='arsiv'){ st='arsiv'; css='p-grey'; tagcss='t-grey'; etiket='Arşiv'; }
  else if(kalan<=0 && Number(t.toplam_borc)>0){ st='odendi'; css='p-green'; tagcss='t-green'; etiket='Ödendi'; }
  else if(t.odeme_gunu && t.odeme_gunu < bugun){ st='gecikti'; css='p-red'; tagcss='t-red'; etiket='Gecikti'; }
  else if(t.odeme_gunu === bugun){ st='bugun'; css='p-amber'; tagcss='t-amber'; etiket='Bugün'; }
  else if(odenen>0){ st='kismi'; css='p-orange'; tagcss='t-orange'; etiket='Kısmi ödendi'; }
  else { st='yaklasan'; css='p-blue'; tagcss='t-blue'; etiket='Yaklaşan'; }
  if(st==='gecikti' && odenen>0) etiket='Gecikti · Kısmi';
  if(st==='bugun' && odenen>0) etiket='Bugün · Kısmi';
  return {...t, odenen, kalan, st, css, tagcss, etiket};
}

/* ================= VERİ ================= */
async function verileriYukle(){
  const {data, error} = await db.from('takipler').select('*, odemeler(tutar)').order('odeme_gunu',{ascending:true});
  if(error){ toast('Veri alınamadı: '+error.message); return; }
  S.takipler = (data||[]).map(zengin);
}
async function ayarlariYukle(){
  const {data} = await db.from('ayarlar').select('*').eq('id',1).single();
  S.ayarlar = data || {magaza_adi:'WM HOME', iban_adi:'', iban:'', taslak_borc:'', taslak_icra:''};
}
async function detayYukle(id){
  const [t,k,o] = await Promise.all([
    db.from('takipler').select('*').eq('id',id).single(),
    db.from('kayitlar').select('*').eq('takip_id',id).order('created_at',{ascending:false}),
    db.from('odemeler').select('*').eq('takip_id',id).order('odeme_tarihi',{ascending:false})
  ]);
  S.kayitlar = k.data||[]; S.odemeler = o.data||[];
  S.detail = zengin({...t.data, odemeler:S.odemeler});
}

/* ================= WHATSAPP ================= */
function mesajDoldur(sablon, t){
  const a = S.ayarlar||{};
  return (sablon||'')
    .replaceAll('{ad_soyad}', t.ad_soyad)
    .replaceAll('{toplam_borc}', new Intl.NumberFormat('tr-TR').format(t.toplam_borc))
    .replaceAll('{odenen_tutar}', new Intl.NumberFormat('tr-TR').format(t.odenen))
    .replaceAll('{kalan_tutar}', new Intl.NumberFormat('tr-TR').format(t.kalan))
    .replaceAll('{odeme_gunu}', trTarih(t.odeme_gunu))
    .replaceAll('{magaza_adi}', a.magaza_adi||'WM HOME')
    .replaceAll('{iban_adi}', a.iban_adi||'')
    .replaceAll('{iban}', a.iban||'');
}
function waGonder(tur){
  const t = S.detail;
  const telSec = $('waTel'); const tel = telNorm(telSec ? telSec.value : t.telefon1);
  if(!tel || tel.length<11){ toast('Geçerli telefon numarası yok'); return; }
  const sablon = tur==='icra' ? S.ayarlar.taslak_icra : S.ayarlar.taslak_borc;
  const msg = mesajDoldur(sablon, t);
  window.open('https://wa.me/'+tel+'?text='+encodeURIComponent(msg), '_blank');
}

/* ================= GÖRÜNÜMLER ================= */
function render(){
  if(!S.session){ renderLogin(); return; }
  let inner='';
  if(S.view==='dash') inner=vDash();
  else if(S.view==='list') inner=vList();
  else if(S.view==='detail') inner=vDetail();
  else if(S.view==='form') inner=vForm();
  else if(S.view==='ayarlar') inner=vAyarlar();
  $('app').innerHTML = vTopbar() + '<div class="wrap">'+inner+'</div>';
  const si=$('search'); if(si){ si.value=S.query; si.oninput=e=>{ S.query=e.target.value; if(S.query.trim()){ S.view='list'; S.listMode='ara'; } else if(S.listMode==='ara'){ S.view='dash'; } render(); const s2=$('search'); s2.focus(); s2.setSelectionRange(s2.value.length,s2.value.length); }; }
}

function vTopbar(){
  return `<div class="topbar">
    <div class="logo" onclick="git('dash')">WM HOME</div>
    <div class="searchwrap"><input id="search" placeholder="Takip ara (isim veya telefon)"></div>
    <button class="btn btn-add" onclick="yeniForm()">+ <span>Takip ekle</span></button>
    <button class="btn btn-ghost" onclick="git('ayarlar')">Ayarlar</button>
    <button class="btn btn-ghost" onclick="cikis()">Çıkış</button>
  </div>`;
}

function kisiKart(t, altBilgi){
  const sub = altBilgi!==undefined ? altBilgi :
    (t.st==='gecikti' ? 'Söz verilen: '+trTarih(t.odeme_gunu) :
     t.st==='bugun' ? (t.telefon1||'') :
     'Ödeme günü: '+trTarih(t.odeme_gunu));
  return `<div class="person ${t.css}" onclick="ac('${t.id}')">
    <div><div class="name">${esc(t.ad_soyad)} <span class="tag ${t.tagcss}">${t.etiket}</span></div>
    <div class="sub">${esc(sub)}</div></div>
    <div class="amt">${para(t.kalan)}<div class="muted" style="font-weight:400">kalan</div></div>
  </div>`;
}

function vDash(){
  const aktif = S.takipler.filter(t=>t.st!=='arsiv' && t.st!=='odendi');
  const geciken = aktif.filter(t=>t.st==='gecikti');
  const bugunkiler = aktif.filter(t=>t.st==='bugun');
  const yaklasan = aktif.filter(t=>t.st==='yaklasan'||t.st==='kismi').filter(t=>t.odeme_gunu).sort((a,b)=>a.odeme_gunu<b.odeme_gunu?-1:1);
  const tarih = new Date().toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric',weekday:'long'});
  const topla = arr => arr.reduce((a,t)=>a+t.kalan,0);

  const solKutu = `<div class="sidebox box-red" onclick="liste('geciken')">
    <div style="font-size:13px;font-weight:600">Geciken ödemeler</div>
    <div class="num">${geciken.length} kişi</div>
    <div style="font-size:13px">Toplam ${para(topla(geciken))}</div>
    <div class="go">Tümünü gör →</div></div>`;

  const sagKutu = `<div class="sidebox box-blue" onclick="liste('yaklasan')">
    <div style="font-size:13px;font-weight:600;margin-bottom:8px">Yaklaşan borçlar</div>
    ${yaklasan.slice(0,6).map(t=>`<div class="upitem"><span><b>${trTarih(t.odeme_gunu).slice(0,5)}</b> ${esc(t.ad_soyad.split(' ')[0])} ${esc((t.ad_soyad.split(' ')[1]||'')[0]||'')}.</span><span>${para(t.kalan)}</span></div>`).join('') || '<div class="upitem muted">Yaklaşan borç yok</div>'}
    <div class="uptotal">Gelecek toplam: ${para(topla(yaklasan))}</div>
    <div class="go">Tümünü gör →</div></div>`;

  const orta = `<div class="card">
    <div style="font-size:14px;font-weight:600;color:var(--muted);margin-bottom:10px">Bugün ödeyecekler — ${bugunkiler.length} kişi, ${para(topla(bugunkiler))}</div>
    ${bugunkiler.map(t=>kisiKart(t)).join('') || '<div class="empty">Bugün için planlanmış ödeme yok.</div>'}
  </div>`;

  return `<div class="bigdate">${tarih}</div>
    <div class="statline">Toplam aktif borç: <b>${para(topla(aktif))}</b> · ${aktif.length} açık takip
      &nbsp;·&nbsp; <a href="#" onclick="liste('odenen');return false" style="color:var(--green-ink)">Ödenenler</a>
      &nbsp;·&nbsp; <a href="#" onclick="liste('arsiv');return false">Arşiv</a></div>
    <div class="board">${solKutu}${orta}${sagKutu}</div>`;
}

function vList(){
  let baslik='', liste=[], bos='Kayıt bulunamadı.';
  const aktif = S.takipler.filter(t=>t.st!=='arsiv');
  if(S.listMode==='geciken'){ baslik='Geciken ödemeler'; liste=aktif.filter(t=>t.st==='gecikti').sort((a,b)=>a.odeme_gunu<b.odeme_gunu?-1:1); bos='Geciken ödeme yok. 🎉'; }
  else if(S.listMode==='yaklasan'){ baslik='Yaklaşan borçlar'; liste=aktif.filter(t=>t.st==='yaklasan'||t.st==='kismi'||t.st==='bugun').filter(t=>t.odeme_gunu).sort((a,b)=>a.odeme_gunu<b.odeme_gunu?-1:1); }
  else if(S.listMode==='odenen'){ baslik='Ödenenler'; liste=S.takipler.filter(t=>t.st==='odendi'); }
  else if(S.listMode==='arsiv'){ baslik='Arşiv'; liste=S.takipler.filter(t=>t.st==='arsiv'); }
  else if(S.listMode==='ara'){
    const q=S.query.trim().toLocaleLowerCase('tr'); const qd=q.replace(/\D/g,'');
    baslik='Arama: "'+esc(S.query)+'"';
    liste=S.takipler.filter(t=> t.ad_soyad.toLocaleLowerCase('tr').includes(q) ||
      (qd && [t.telefon1,t.telefon2,t.telefon3].some(p=>p && p.replace(/\D/g,'').includes(qd))));
    bos='Eşleşen takip yok. Sağ üstten yeni takip ekleyebilirsin.';
  }
  const toplam = liste.reduce((a,t)=>a+t.kalan,0);
  let dip = (S.listMode==='yaklasan') ? `<div class="card" style="margin-top:10px;font-weight:700">Gelecek ödemelerle alakalı toplam borç: ${para(toplam)}</div>` : '';
  return `<span class="back" onclick="git('dash')">← Ana sayfa</span>
    <h2>${baslik} <span class="muted" style="font-weight:400">(${liste.length})</span></h2>
    ${liste.map(t=>kisiKart(t)).join('') || '<div class="empty">'+bos+'</div>'}${dip}`;
}

function vDetail(){
  const t=S.detail; if(!t) return '';
  const teller=[t.telefon1,t.telefon2,t.telefon3].filter(Boolean);
  const telSecim = teller.length ? `<select id="waTel" class="btn btn-line" style="padding:8px 10px">${teller.map((p,i)=>`<option value="${esc(p)}">Tel ${i+1}: ${esc(p)}</option>`).join('')}</select>` : '';
  return `<span class="back" onclick="git('dash')">← Ana sayfa</span>
  <div class="card">
    <div class="dethead">
      <div>
        <div class="detname">${esc(t.ad_soyad)} <span class="tag ${t.tagcss}">${t.etiket}</span></div>
        <div class="muted" style="margin-top:4px">Kayıt: ${trSaat(t.created_at)} ${teller.map(p=>`&nbsp;·&nbsp;<a href="tel:${telNorm(p)}" style="font-weight:600">${esc(p)}</a>`).join('')}</div>
      </div>
      <div class="flexrow">
        <button class="btn btn-line" onclick="duzenleForm()">Bilgileri düzenle</button>
        ${t.durum==='arsiv'
          ? `<button class="btn btn-line" onclick="arsiv(false)">Arşivden çıkar</button><button class="btn btn-danger" onclick="kalıcıSil()">Kalıcı sil</button>`
          : `<button class="btn btn-danger" onclick="arsiv(true)">Arşivle</button>`}
      </div>
    </div>
    <div class="kv">
      <div class="cell"><span>Toplam borç</span><b>${para(t.toplam_borc)}</b></div>
      <div class="cell"><span>Ödenen</span><b style="color:var(--green-ink)">${para(t.odenen)}</b></div>
      <div class="cell"><span>Kalan</span><b style="color:${t.kalan>0?'var(--red-ink)':'var(--green-ink)'}">${para(t.kalan)}</b></div>
      <div class="cell"><span>Söz verilen ödeme günü</span><b>${trTarih(t.odeme_gunu)}</b></div>
    </div>
    <div class="flexrow">
      ${telSecim}
      <button class="btn btn-wa" onclick="waGonder('borc')">Borç mesajı at</button>
      <button class="btn btn-icra" onclick="waGonder('icra')">İcra mesajı at</button>
    </div>
  </div>

  <div class="section card">
    <h2>Ödeme gir</h2>
    <div class="flexrow">
      <input id="odTutar" type="number" step="0.01" min="0" placeholder="Tutar (TL)" style="padding:10px 12px;border:1px solid var(--line);border-radius:8px;width:150px">
      <input id="odTarih" type="date" value="${bugunISO()}" style="padding:9px 12px;border:1px solid var(--line);border-radius:8px">
      <button class="btn btn-green" onclick="odemeEkle()">Kaydet</button>
      ${t.kalan>0?`<button class="btn btn-line" onclick="$('odTutar').value=${t.kalan}">Kalanın tamamı (${para(t.kalan)})</button>`:''}
    </div>
    ${S.odemeler.length?`<div style="margin-top:12px">${S.odemeler.map(o=>`<div class="payrow"><span>${trTarih(o.odeme_tarihi)} — <b>${para(o.tutar)}</b></span><button class="iconbtn" onclick="odemeSil('${o.id}')">Sil</button></div>`).join('')}</div>`:''}
  </div>

  <div class="section card">
    <h2>Kayıtlar</h2>
    <div class="field"><textarea id="yeniKayit" placeholder="Yeni kayıt yaz… (örn: Arandı, ayın 20'sinde 5.000 TL ödeyeceğini söyledi)"></textarea></div>
    <button class="btn btn-primary" onclick="kayitEkle()">Yeni kayıt ekle</button>
    <div style="margin-top:14px">
      ${S.kayitlar.map(k=>`<div class="note" id="not-${k.id}">
        <div class="meta"><span><b>${trSaat(k.created_at)}</b>${k.updated_at?` · <i>düzenlendi: ${trSaat(k.updated_at)}</i>`:''}</span>
        <span><button class="iconbtn" onclick="kayitDuzenle('${k.id}')">Düzenle</button></span></div>
        <div class="body">${esc(k.icerik)}</div>
      </div>`).join('') || '<div class="empty">Henüz kayıt yok.</div>'}
    </div>
  </div>`;
}

function vForm(){
  const t = S.formData || {};
  const yeni = !t.id;
  return `<span class="back" onclick="git(S.donus||'dash')">← Geri</span>
  <div class="card" style="max-width:560px">
    <h2>${yeni?'Yeni takip ekle':'Takip bilgilerini düzenle'}</h2>
    <div class="field"><label>Ad Soyad *</label><input id="f_ad" value="${esc(t.ad_soyad||'')}"></div>
    <div class="cols2">
      <div class="field"><label>Telefon 1</label><input id="f_t1" value="${esc(t.telefon1||'')}" placeholder="05xx xxx xx xx"></div>
      <div class="field"><label>Telefon 2</label><input id="f_t2" value="${esc(t.telefon2||'')}"></div>
    </div>
    <div class="cols2">
      <div class="field"><label>Telefon 3</label><input id="f_t3" value="${esc(t.telefon3||'')}"></div>
      <div class="field"><label>Borç tutarı (TL) *</label><input id="f_borc" type="number" step="0.01" min="0" value="${t.toplam_borc??''}"></div>
    </div>
    <div class="field"><label>Söz verilen ödeme günü</label><input id="f_gun" type="date" value="${t.odeme_gunu||''}"></div>
    ${yeni?`<div class="field"><label>İlk kayıt / not</label><textarea id="f_not" placeholder="Görüşme notu… (tarih ve saatiyle kaydedilir)"></textarea></div>`:''}
    <div class="flexrow"><button class="btn btn-primary" onclick="takipKaydet()">${yeni?'Takibi kaydet':'Değişiklikleri kaydet'}</button></div>
  </div>`;
}

function vAyarlar(){
  const a=S.ayarlar||{};
  return `<span class="back" onclick="git('dash')">← Ana sayfa</span>
  <div class="card" style="max-width:640px">
    <h2>Ayarlar</h2>
    <div class="field"><label>Mağaza adı</label><input id="a_magaza" value="${esc(a.magaza_adi||'')}"></div>
    <div class="cols2">
      <div class="field"><label>Hesap (IBAN) adı</label><input id="a_ibanadi" value="${esc(a.iban_adi||'')}" placeholder="Örn: WM HOME Mobilya Ltd."></div>
      <div class="field"><label>IBAN</label><input id="a_iban" value="${esc(a.iban||'')}" placeholder="TR.."></div>
    </div>
    <div class="field"><label>Borç hatırlatma mesajı taslağı</label><textarea id="a_borc" style="min-height:130px">${esc(a.taslak_borc||'')}</textarea></div>
    <div class="field"><label>İcra uyarı mesajı taslağı</label><textarea id="a_icra" style="min-height:130px">${esc(a.taslak_icra||'')}</textarea></div>
    <div class="muted" style="margin-bottom:12px">Kullanılabilir değişkenler: {ad_soyad} {toplam_borc} {odenen_tutar} {kalan_tutar} {odeme_gunu} {magaza_adi} {iban_adi} {iban}</div>
    <button class="btn btn-primary" onclick="ayarKaydet()">Ayarları kaydet</button>
    <div class="muted" style="margin-top:16px">Giriş yapan: ${esc(S.session.user.email)}</div>
  </div>`;
}

function renderLogin(msg){
  $('app').innerHTML = `<div class="loginwrap"><div class="loginbox">
    <h1>WM HOME</h1><p>Tahsilat Takip Paneli</p>
    ${msg?`<div class="err">${esc(msg)}</div>`:''}
    <div class="field"><label>E-posta</label><input id="l_email" type="email" autocomplete="username"></div>
    <div class="field"><label>Şifre</label><input id="l_pass" type="password" autocomplete="current-password"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px" onclick="giris()">Giriş yap</button>
  </div></div>`;
  $('l_pass').addEventListener('keydown', e=>{ if(e.key==='Enter') giris(); });
}

/* ================= EYLEMLER ================= */
async function giris(){
  const {error} = await db.auth.signInWithPassword({email:$('l_email').value.trim(), password:$('l_pass').value});
  if(error){ renderLogin('Giriş başarısız: e-posta veya şifre hatalı.'); return; }
}
async function cikis(){ await db.auth.signOut(); }

function git(v){ S.view=v; if(v==='dash'){S.query=''; S.listMode=null;} render(); }
function liste(mode){ S.listMode=mode; S.view='list'; render(); }
async function ac(id){ await detayYukle(id); S.view='detail'; render(); window.scrollTo(0,0); }
function yeniForm(){ S.formData={}; S.donus='dash'; S.view='form'; render(); }
function duzenleForm(){ S.formData={...S.detail}; S.donus='detail'; S.view='form'; render(); }

async function takipKaydet(){
  const ad=$('f_ad').value.trim(); const borc=parseFloat($('f_borc').value);
  if(!ad){ toast('Ad soyad zorunlu'); return; }
  if(isNaN(borc)){ toast('Borç tutarı zorunlu'); return; }
  const kayit={ ad_soyad:ad, telefon1:$('f_t1').value.trim()||null, telefon2:$('f_t2').value.trim()||null,
    telefon3:$('f_t3').value.trim()||null, toplam_borc:borc, odeme_gunu:$('f_gun').value||null };
  if(S.formData.id){
    const {error}=await db.from('takipler').update(kayit).eq('id',S.formData.id);
    if(error){ toast('Hata: '+error.message); return; }
    await verileriYukle(); await detayYukle(S.formData.id); S.view='detail'; toast('Güncellendi');
  } else {
    kayit.created_by=S.session.user.id;
    const {data,error}=await db.from('takipler').insert(kayit).select().single();
    if(error){ toast('Hata: '+error.message); return; }
    const not=$('f_not').value.trim();
    if(not) await db.from('kayitlar').insert({takip_id:data.id, icerik:not, created_by:S.session.user.id});
    await verileriYukle(); await detayYukle(data.id); S.view='detail'; toast('Takip eklendi');
  }
  render();
}

async function kayitEkle(){
  const ic=$('yeniKayit').value.trim(); if(!ic){ toast('Kayıt boş olamaz'); return; }
  const {error}=await db.from('kayitlar').insert({takip_id:S.detail.id, icerik:ic, created_by:S.session.user.id});
  if(error){ toast('Hata: '+error.message); return; }
  await detayYukle(S.detail.id); render(); toast('Kayıt eklendi');
}

function kayitDuzenle(id){
  const k=S.kayitlar.find(x=>x.id===id);
  const el=$('not-'+id);
  el.innerHTML=`<div class="field"><textarea id="edit-${id}">${esc(k.icerik)}</textarea></div>
  <div class="flexrow"><button class="btn btn-primary" onclick="kayitGuncelle('${id}')">Kaydet</button>
  <button class="btn btn-line" onclick="render()">Vazgeç</button></div>`;
}
async function kayitGuncelle(id){
  const ic=$('edit-'+id).value.trim(); if(!ic){ toast('Kayıt boş olamaz'); return; }
  const {error}=await db.from('kayitlar').update({icerik:ic, updated_at:new Date().toISOString()}).eq('id',id);
  if(error){ toast('Hata: '+error.message); return; }
  await detayYukle(S.detail.id); render(); toast('Kayıt güncellendi');
}

async function odemeEkle(){
  const tutar=parseFloat($('odTutar').value);
  if(isNaN(tutar)||tutar<=0){ toast('Geçerli bir tutar gir'); return; }
  const {error}=await db.from('odemeler').insert({takip_id:S.detail.id, tutar, odeme_tarihi:$('odTarih').value||bugunISO(), created_by:S.session.user.id});
  if(error){ toast('Hata: '+error.message); return; }
  await verileriYukle(); await detayYukle(S.detail.id); render();
  toast(S.detail.kalan<=0 ? 'Ödeme alındı — borç kapandı! ✅' : 'Ödeme kaydedildi');
}
async function odemeSil(id){
  if(!confirm('Bu ödeme kaydı silinsin mi?')) return;
  await db.from('odemeler').delete().eq('id',id);
  await verileriYukle(); await detayYukle(S.detail.id); render(); toast('Ödeme silindi');
}

async function arsiv(yap){
  if(yap && !confirm(S.detail.ad_soyad+' arşive taşınsın mı? (Ana listelerde görünmez, arşivden geri alınabilir)')) return;
  await db.from('takipler').update({durum: yap?'arsiv':'bekliyor'}).eq('id',S.detail.id);
  await verileriYukle(); await detayYukle(S.detail.id); render(); toast(yap?'Arşive taşındı':'Arşivden çıkarıldı');
}
async function kalıcıSil(){
  if(!confirm('DİKKAT: '+S.detail.ad_soyad+' tüm kayıtları ve ödemeleriyle birlikte KALICI olarak silinecek. Bu işlem geri alınamaz. Emin misin?')) return;
  if(!confirm('Son onay: kalıcı olarak silinsin mi?')) return;
  await db.from('takipler').delete().eq('id',S.detail.id);
  await verileriYukle(); git('dash'); toast('Kalıcı olarak silindi');
}

async function ayarKaydet(){
  const {error}=await db.from('ayarlar').update({
    magaza_adi:$('a_magaza').value.trim()||'WM HOME',
    iban_adi:$('a_ibanadi').value.trim(), iban:$('a_iban').value.trim(),
    taslak_borc:$('a_borc').value, taslak_icra:$('a_icra').value
  }).eq('id',1);
  if(error){ toast('Hata: '+error.message); return; }
  await ayarlariYukle(); toast('Ayarlar kaydedildi');
}

/* ================= BAŞLANGIÇ ================= */
db.auth.onAuthStateChange(async (_ev, session)=>{
  S.session=session;
  if(session){ await Promise.all([verileriYukle(), ayarlariYukle()]); S.view='dash'; }
  render();
});
(async ()=>{
  const {data:{session}}=await db.auth.getSession();
  S.session=session;
  if(session){ await Promise.all([verileriYukle(), ayarlariYukle()]); }
  render();
})();
</script>
</body>
</html>
